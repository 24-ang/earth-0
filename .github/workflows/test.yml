name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - name: Run Tests with Log Capture
        run: |
          set -o pipefail
          npx tsx test.ts 2>&1 | tee test-result.log
      - name: Send logs to ntfy
        if: always()
        run: |
          if [ -f test-result.log ]; then
            PASTE_URL=$(curl -s --data-binary @test-result.log https://paste.c-net.org/)
            curl -d "CI Logs URL: $PASTE_URL" https://ntfy.sh/earth-0-ci-logs
          else
            curl -d "No log file found" https://ntfy.sh/earth-0-ci-logs
          fi
